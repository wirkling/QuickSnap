name: QuickSnap
options:
  bundleIdPrefix: com.dirkwilfling
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  QuickSnap:
    type: application
    platform: macOS
    sources:
      - QuickSnap
    settings:
      base:
        INFOPLIST_FILE: QuickSnap/Info.plist
        CODE_SIGN_ENTITLEMENTS: QuickSnap/QuickSnap.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.dirkwilfling.QuickSnap
        PRODUCT_NAME: QuickSnap
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        COMBINE_HIDPI_IMAGES: YES
